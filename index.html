 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Card Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
 </head>
   <header> Source Card: Create Internet Posters </header>
 <body>
   <!--Left Pane-->
    <div id = 'left_pane'>
         <div id = "text_input">
            <p id="card_content_title">Card Content</p>
            <textarea id="text_area" rows="5" cols="40" placeholder="Type your thoughts here..."></textarea>
            <button id="download_btn">Download Card</button>
         </div>
      <!--Profile Area-->
      <div id="profile_area">
         <div id="profile_toggle">
            <p id="profile_title">Show Profile</p>
            <label class="switch">
               <input type="checkbox">
               <span class="slider"></span>
            </label>
         </div>
            <p id="profile_detail">Profile Picture</p> 
            <svg width="40" height="40" viewBox="0 0 24 24">
               <circle cx="12" cy="8" r="4" fill="#ccc"/>
               <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="#ccc"/>
            </svg>
         <label for="upload_profile" id="upload_button">
            Upload Profile
         </label><!--Should have "Upload along side the upload svg inside of it, might need to turn this into a div"-->
         <input type="file" id="upload_profile" accept="image/*"> 
         <input type="text" id="username_input" placeholder="Enter Username" >
         <input type="text" id="social_media_handle_input" placeholder="Enter Handle">
      </div>
      <!--/Profile Area-->
      <!--Typography-->
      <!--//TODO: have to connect the typography changes with script-->
      <!--Typography title-->
      <div id="typography_area">
         <p id="typography_title">Title</p>
         <label for="font_select">Font Style:</label>
         <select id="font_select">
            <option value="Inter">Inter</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
         </select>
         <br/>
         <label for="font_size">Font Size:</label>
         <input type="number" id="font_size" min="10" max="72" value="16">
         <br/>
         <label for="font_color">Font Color:</label>
         <input type="color" id="font_color" value="#000000">
      </div>
      <!--/Typography title-->
      <!--Typography body-->
      <div id="typography_area">
         <p id="typography_title">Body</p>
         <label for="font_select">Font Style:</label>
         <select id="font_select">
            <option value="Inter">Inter</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
         </select>
         <br/>
         <label for="font_size">Font Size:</label>
         <input type="number" id="font_size" min="10" max="72" value="16">
         <br/>
         <label for="font_color">Font Color:</label>
         <input type="color" id="font_color" value="#000000">
      </div>
      <!--/Typography body-->
      <!--/Typography-->
      <!--Card Border-->
      <div id="border_area">
         <p id="border_title">Border</p>
         <label for="border_color">Border Color:</label>
         <label> <input type="checkbox" id="toggle"> Enable Border </label> <!--This will be used to toggle the border on and off, it should look like a toggle so we need to style it-->
         <input type="color" id="border_color" value="#000000">
         <br/>
         <label for="border_width">Border Width:</label>
         <input type="number" id="border_width" min="0" max="20" value="1">
      </div>
      <!--/Card Border-->
   <!--/Left Pane-->

   <!--Edit Area Title-->
      <div id="edit_area_title">
         <p>Preview</p>
      </div>
   <!--/Edit Area Title-->

   <!--Center Window-->
    <div id = 'center_canvas'>
      <canvas id="my_canvas" width="550" height="450" ></canvas>
    </div>
    <!--Center Window-->
    <footer> Made by Myles </footer>
    <script src="script.js"></script>
 </body>
 </html>
