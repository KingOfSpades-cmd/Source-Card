 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Card Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
 </head>
   <header> Source Card: Create Internet Posters </header>
 <body>
   <!--Left Pane-->
    <div id = 'left_pane'>
         <div id = "text_input">
            <p id="card_content_title">Card Content</p>
            <textarea id="text_area" rows="5" cols="40" placeholder="Type your thoughts here..."></textarea>
            <button id="download_btn">Download Card</button>
         </div>
      <!--Profile Area-->
      <div id="profile_area">
         <div class="control_header">
            <p id="profile_title">Show Profile</p>
            <label class="switch">
               <input type="checkbox">
               <span class="slider"></span>
            </label>
         </div>
            <p id="profile_detail">Profile Picture</p>
            <div id="profile_upload_wrapper">
               <svg width="40" height="40" viewBox="0 0 24 24">
                  <circle cx="12" cy="8" r="4" fill="#ccc"/>
                  <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="#ccc"/>
               </svg>
               <label for="upload_profile" id="upload_button">
                  Upload Profile
               </label><!--Should have "Upload along side the upload svg inside of it, might need to turn this into a div"-->
            </div> 
         <input type="file" id="upload_profile" accept="image/*"> 
         <input type="text" id="username_input" placeholder="Enter Username">
         <input type="text" id="social_media_handle_input" placeholder="Enter Handle">
      </div>
      <!--/Profile Area-->

      <!--Typography-->
      <!--//TODO: have to connect the typography changes with script-->
      <!--Typography title-->
      <div class="control_section">
         <p class="section_subtitle">Title Typography</p>
         <div class="input_group">
            <label for="title_font_style">Font Style</label>
            <select id="title_font_style" class="custom_select">
               <option value="Inter">Inter</option>
               <option value="Arial">Arial</option>
               <option value="Times New Roman">Times New Roman</option>
               <option value="Courier New">Courier New</option>
            </select>
         </div>
         <div class="input_group">
            <label for="body_font_size">Font Size</label>
            <input type="number" id="body_font_size" class="custom_number_input" min="10" max="72" value="16">
         </div>
      </div>
      <!--/Typography title-->

      <!--Typography body-->
     <div class="control_section"> 
      <p class="section_subtitle">Body Typography</p> 
      <div class="input_group">
         <label for="body_font_style">Font Style</label>
         <select id="body_font_style" class="custom_select">
            <option value="Inter">Inter</option>
            <option value="Arial">Ariel</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
         </select>
      </div>
      <div class="input_group">
         <label for="body_font_size">Font Size</label>
         <input type="number" id="body_font_size" class="custom_number_input" min="10" max="72" value="16">
      </div>
     </div>
      <!--/Typography body-->
      
      <!--/Typography-->
      
      <!--Card Border-->
      <div class="control_section">
         <div class="control_header">
            <p class="section_subtitle">Card Border</p>
            <label class="switch">
               <input type="checkbox" id="toggle_border">
               <span class="slider"></span>
            </label>
         </div>
         <div class="input_group">
            <label for="border_width">Border Width</label>
            <input type="number" id="border_width" class="custom_number_input" min="0" max="20" value="1">
         </div>
         <div class="input_group">
            <label for="border_color">Border Color</label>
            <input type="color" id="border_color" value="#000000">
         </div>
      </div>
      <!--/Card Border-->
   <!--/Left Pane-->

   <!--Edit Area Title-->
      <div id="edit_area_title">
         <p>Preview</p>
      </div>
   <!--/Edit Area Title-->

   <!--Center Window-->
    <div id = 'center_canvas'>
      <canvas id="my_canvas" width="550" height="450" ></canvas>
    </div>
    <!--Center Window-->
    <footer> Made by Myles </footer>
    <script src="script.js"></script>
 </body>
 </html>
